<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>シンプル ToDo アプリ</title>
		<style>
			body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background:#f7f7fb; color:#222; padding:24px; }
			.container { max-width:720px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
			h1 { margin:0 0 12px 0; font-size:20px }
			.input-row { display:flex; gap:8px; margin-bottom:12px }
			#task-input { flex:1; padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:14px }
			#add-btn { padding:8px 12px; border:none; background:#0078d4; color:#fff; border-radius:6px; cursor:pointer }
			#mark-complete-btn { padding:8px 12px; border:none; background:#28a745; color:#fff; border-radius:6px; cursor:pointer }
			#delete-selected-btn { padding:8px 12px; border:none; background:#e04848; color:#fff; border-radius:6px; cursor:pointer }
			#add-btn:active { transform:translateY(1px) }
			.btn-edit { padding:6px 8px; border:none; background:#ffd966; color:#333; border-radius:6px; cursor:pointer }
			.edit-input { padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:14px; flex:1 }
			ul#task-list { list-style:none; padding:0; margin:0 }
			ul#task-list li { display:flex; align-items:center; gap:8px; padding:8px; border-bottom:1px solid #f0f0f0 }
			.task-text { flex:1 }
			.task-text.done { text-decoration:line-through; color:#999 }
			.btn-delete { background:transparent; border:1px solid #e07; color:#e07; padding:6px 8px; border-radius:6px; cursor:pointer }
			.btn-delete:active { transform:translateY(1px) }
			.small { font-size:12px; color:#666; margin-top:8px }
		</style>
	</head>
	<body>
		<div class="container">
			<h1>ToDo アプリ</h1>
			<p class="small">タスクを入力して「追加」または Enter キーで登録します。タスクはブラウザに保存されます。</p>

			<div class="input-row">
				<input id="task-input" type="text" placeholder="やることを入力" aria-label="タスク入力" />
				<button id="delete-selected-btn" aria-label="選択タスク削除">削除</button>
				<button id="mark-complete-btn" aria-label="完了にする">完了</button>
				<button id="add-btn" aria-label="追加">追加</button>
			</div>

			<ul id="task-list" aria-live="polite"></ul>
		</div>

		<script src="todo-list.js" defer></script>
	</body>
</html>
