<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>所得税計算アプリ</title>
		<style>
			body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", Meiryo, sans-serif; background:#f7f7fb; color:#222; padding:24px }
			.container { max-width:900px; margin:0 auto; background:#fff; padding:18px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06) }
			h1 { margin:0 0 12px 0 }
			.grid { display:grid; grid-template-columns: 1fr 150px; gap:8px 12px; align-items:center }
			label { font-size:14px }
			input[type=number] { width:100%; padding:8px; border:1px solid #ddd; border-radius:6px }
			.controls { display:flex; gap:8px; margin-top:12px }
			button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer }
			.btn-calc { background:#0078d4; color:#fff }
			.btn-reset { background:#e04848; color:#fff }
			.results { margin-top:16px; padding:12px; background:#f8fbff; border-radius:6px; border:1px solid #e8f0ff }
			.row { display:flex; gap:12px; align-items:center }
			.small { font-size:13px; color:#666 }
		</style>
	</head>
	<body>
		<div class="container">
			<h1>所得税 計算ツール（簡易版）</h1>
			<p class="small">各所得の金額を入力して「計算」ボタンを押すと、課税標準・課税所得・所得税額を概算します。税率は説明の通り簡易的なモデルです。</p>

			<form id="tax-form">
				<section>
					<h2>所得の入力</h2>
					<div class="grid">
						<label for="income-interest">利子所得</label>
						<input id="income-interest" type="number" step="0.01" min="0" value="0" />

						<label for="income-dividend">配当所得</label>
						<input id="income-dividend" type="number" step="0.01" min="0" value="0" />

						<label for="income-real-estate">不動産所得</label>
						<input id="income-real-estate" type="number" step="0.01" min="0" value="0" />

						<label for="income-business">事業所得</label>
						<input id="income-business" type="number" step="0.01" min="0" value="0" />

						<label for="income-salary">給与所得</label>
						<input id="income-salary" type="number" step="0.01" min="0" value="0" />

						<label for="income-retirement">退職所得</label>
						<input id="income-retirement" type="number" step="0.01" min="0" value="0" />

						<label for="income-forestry">山林所得</label>
						<input id="income-forestry" type="number" step="0.01" min="0" value="0" />

						<label for="income-capital">譲渡所得</label>
						<input id="income-capital" type="number" step="0.01" min="0" value="0" />

						<label for="income-temporary">一時所得</label>
						<input id="income-temporary" type="number" step="0.01" min="0" value="0" />

						<label for="income-misc">雑所得</label>
						<input id="income-misc" type="number" step="0.01" min="0" value="0" />
					</div>
				</section>

				<section style="margin-top:12px">
					<h2>控除 / 税額控除</h2>
					<div class="grid">
						<label for="deductions">所得控除 合計</label>
						<input id="deductions" type="number" step="0.01" min="0" value="0" />

						<label for="tax-credits">税額控除 合計</label>
						<input id="tax-credits" type="number" step="0.01" min="0" value="0" />
					</div>
				</section>

				<div class="controls">
					<button type="button" id="calculate" class="btn-calc">計算</button>
					<button type="button" id="reset" class="btn-reset">リセット</button>
				</div>
			</form>

			<div id="results" class="results" aria-live="polite" hidden>
				<h3>結果</h3>
				<div id="results-content"></div>
			</div>
		</div>

		<script src="app.js" defer></script>
	</body>
</html>
